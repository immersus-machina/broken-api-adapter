name: Schema Drift Check

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 06:00 UTC
  workflow_dispatch: {}

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Check for schema drift
        id: drift
        run: |
          DRIFT_DETECTED=false

          # Iterate over each entry in the manifest
          for row in $(jq -c '.[]' SchemaReferences/manifest.json); do
            SCHEMA_FILE=$(echo "$row" | jq -r '.schema')
            URL=$(echo "$row" | jq -r '.url')
            SCHEMA_PATH="SchemaReferences/${SCHEMA_FILE}"

            echo "Checking $SCHEMA_FILE against $URL"

            # Extract current schema from the live endpoint
            LIVE_SCHEMA=$(bash .github/scripts/extract-schema.sh "$URL")

            if [ $? -ne 0 ] || [ -z "$LIVE_SCHEMA" ]; then
              echo "::warning::Failed to fetch schema from $URL — skipping"
              continue
            fi

            # Compare with stored reference
            STORED_SCHEMA=$(cat "$SCHEMA_PATH")

            if [ "$LIVE_SCHEMA" != "$STORED_SCHEMA" ]; then
              echo "Drift detected for $SCHEMA_FILE"
              echo "$LIVE_SCHEMA" > "$SCHEMA_PATH"
              DRIFT_DETECTED=true
            else
              echo "No drift for $SCHEMA_FILE"
            fi
          done

          echo "drift_detected=$DRIFT_DETECTED" >> "$GITHUB_OUTPUT"

      - name: Commit, push, create PR and merge
        if: steps.drift.outputs.drift_detected == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="schema-drift/$(date +%Y%m%d-%H%M%S)"
          git config user.name "schema-drift-bot[bot]"
          git config user.email "schema-drift-bot[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add SchemaReferences/*.schema.json
          git commit -m "chore: update schema references — drift detected"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: update schema references — drift detected" \
            --body "Automated schema drift detection found changes in the external API response structure." \
            --base main \
            --head "$BRANCH"

          git checkout main
          gh pr merge "$BRANCH" --squash --delete-branch
